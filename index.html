<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مجلة مركز تنمية القدرات الصيفي للصحافة</title>
    <!-- استيراد الخطوط -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <!-- ملف التنسيق -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>مجلة مركز تنمية القدرات الصيفي للصحافه</h1>
        <p style="font-size: 1.2rem; color: #64748b;">صوت التنمية والصحافة الرقمية</p>
        
        <div class="author-info" style="margin-top: 15px;">
            <p><strong>رئيسة التحرير: ريتال أشرف</strong></p>
            <p>محافظة مطروح</p>
        </div>
    </header>

    <main class="newspaper-layout">
        
        <!-- قسم البودكاست -->
        <section class="podcast-section">
            <h3>🎙️ البودكاست</h3>
            <div class="podcast-box">
                <iframe 
                    src="https://www.youtube.com/embed/_VeKg4bBdr4" 
                    width="100%" 
                    height="315" 
                    frameborder="0" 
                    allowfullscreen>
                </iframe>
            </div>
        </section>

        <!-- قسم الحوار الصوتي -->
        <section class="interview-section">
            <h3>📝 حديث صحفي</h3>
            <div class="interview-box">
                <p>أستاذة صفاء المعناوي - موجه عام الصحافة </p>
                <audio controls>
                    <source src="misssafaa.mp3" type="audio/mpeg">
                    متصفحك لا يدعم تشغيل ملف الصوت.
                </audio>
            </div>
        </section>

        <!-- قسم الأحاديث الصحفية -->
        <aside class="cards-container">
            <div class="side-card">
                <h3>🎥 لقاء مع مدير مجمع خيرالله فضل</h3>
                <iframe 
                    src="https://www.youtube.com/embed/iB8z6TUi9Ts" 
                    width="100%" 
                    height="315" 
                    frameborder="0" 
                    allowfullscreen>
                </iframe>
            </div>

            <!-- ورشة العمل -->
            <div class="side-card">
                <h3>📺 ورشة عمل النشرة الإخبارية</h3>
                <iframe 
                    src="https://www.youtube.com/embed/_J-fQ6MZV5M" 
                    width="100%" 
                    height="315" 
                    frameborder="0" 
                    allowfullscreen>
                </iframe>
            </div>
        </aside>

    </main>

    <footer>
        <p>جميع الحقوق محفوظة - مركز تنمية القدرات الصحفية 2026</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
